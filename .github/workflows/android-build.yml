name: Android CI
on:
  push:
    branches: [ "main", "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate Platform Folders
        run: flutter create --platforms=android .
        
      - name: Inject Internet Permissions
        run: sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Universal APK
        run: flutter build apk --release
        
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Kainuwa-VTU-APK
          path: build/app/outputs/flutter-apk/app-release.apk
