name: Android CI
on:
  push:
    branches: [ "main", "master" ]

# Grant the cloud runner permission to push the keystore back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate and Save Keystore (Cloud Only)
        run: |
          if [ ! -f keystore/kainuwa.jks ]; then
            mkdir -p keystore
            keytool -genkey -v -keystore keystore/kainuwa.jks -keyalg RSA -keysize 2048 -validity 10000 -alias kainuwa -dname "CN=Kainuwa Digital Africa, OU=Mobile Dev, O=Kainuwa, L=Nigeria, S=State, C=NG" -storepass "kainuwa123" -keypass "kainuwa123"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore/kainuwa.jks
            git commit -m "Auto-generate permanent app keystore"
            git push
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Platform Folders
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Configure App Brand, Package, and Icons
        run: |
          dart run rename_app:main all="Kainuwa Data"
          dart run change_app_package_name:main com.kainuwa.vtu
          dart run flutter_launcher_icons

      - name: Inject Internet & Biometric Permissions
        run: |
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.USE_BIOMETRIC" />' android/app/src/main/AndroidManifest.xml

      - name: Inject URL Launcher Queries
        run: |
          sed -i '/<\/manifest>/i \    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="https" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="tel" />\n        </intent>\n    </queries>' android/app/src/main/AndroidManifest.xml

      - name: Inject FlutterFragmentActivity for Biometrics
        run: |
          cat << 'INNER_EOF' > android/app/src/main/kotlin/com/kainuwa/vtu/MainActivity.kt
          package com.kainuwa.vtu
          import io.flutter.embedding.android.FlutterFragmentActivity
          class MainActivity: FlutterFragmentActivity() {
          }
          INNER_EOF

      - name: Inject Permanent Signing Config
        run: |
          sed -i '/buildTypes {/i \    signingConfigs {\n        release {\n            storeFile file("../../keystore/kainuwa.jks")\n            storePassword "kainuwa123"\n            keyAlias "kainuwa"\n            keyPassword "kainuwa123"\n        }\n    }' android/app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' android/app/build.gradle

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Kainuwa-Data-APK
          path: build/app/outputs/flutter-apk/app-release.apk
